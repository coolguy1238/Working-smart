<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ValueAI – Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#02020a;--bg2:#070714;--bg3:#0c0c1e;--cyan:#00f5ff;--violet:#8b5cf6;--pink:#f472b6;--border:rgba(255,255,255,0.06);--border2:rgba(0,245,255,0.2);--text:#f0f0ff;--text2:rgba(200,200,240,0.6);--text3:rgba(200,200,240,0.3);--font:'DM Sans',-apple-system,sans-serif;--font-display:'Syne',sans-serif;}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow-x:hidden}
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,245,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.025) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(139,92,246,0.18) 0%,transparent 70%);top:-100px;left:-100px}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(0,245,255,0.12) 0%,transparent 70%);bottom:-50px;right:-50px}
.card{position:relative;z-index:1;width:100%;max-width:420px;padding:2.5rem;background:rgba(7,7,20,0.92);border:1px solid rgba(0,245,255,0.15);border-radius:24px;backdrop-filter:blur(30px);box-shadow:0 0 80px rgba(0,245,255,0.08),0 0 120px rgba(139,92,246,0.06);animation:slideUp .6s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.back{position:fixed;top:1.5rem;left:1.5rem;z-index:10;color:var(--text3);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:5px;transition:color .2s}
.back:hover{color:var(--cyan)}
.logo-wrap{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:2rem}
.logo-mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--violet),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:20px;font-weight:800;color:#02020a;box-shadow:0 0 20px rgba(0,245,255,0.4),0 0 40px rgba(139,92,246,0.2)}
.logo-text{font-family:var(--font-display);font-size:20px;font-weight:700;background:linear-gradient(90deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h1{font-family:var(--font-display);font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:.4rem;letter-spacing:-.02em}
.sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:1.75rem}
.oauth{display:flex;flex-direction:column;gap:.65rem;margin-bottom:1.5rem}
.oauth-btn{display:flex;align-items:center;justify-content:center;gap:.65rem;padding:.75rem;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;transition:border-color .2s,background .2s,box-shadow .2s}
.oauth-btn:hover{border-color:rgba(0,245,255,0.3);background:rgba(0,245,255,0.05);box-shadow:0 0 20px rgba(0,245,255,0.1)}
.oauth-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:15px}
.divider{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem}
.div-line{flex:1;height:1px;background:var(--border)}
.div-txt{font-size:12px;color:var(--text3)}
.field{margin-bottom:1rem}
label{display:block;font-size:11px;font-weight:700;font-family:var(--font-display);color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.45rem}
input[type=email],input[type=password]{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;font-family:var(--font);font-size:14px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
input:focus{border-color:rgba(0,245,255,0.4);box-shadow:0 0 0 3px rgba(0,245,255,0.08)}
input::placeholder{color:var(--text3)}
.field-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.45rem}
.forgot{font-size:12px;color:var(--cyan);text-decoration:none;transition:opacity .2s;font-weight:500}
.forgot:hover{opacity:.7}
.submit{width:100%;padding:.82rem;border-radius:12px;border:none;cursor:pointer;margin-top:.25rem;background:linear-gradient(135deg,var(--violet),var(--cyan));color:#02020a;font-family:var(--font-display);font-size:15px;font-weight:800;box-shadow:0 0 20px rgba(0,245,255,0.25);transition:box-shadow .2s,transform .15s}
.submit:hover{box-shadow:0 0 40px rgba(0,245,255,0.5);transform:translateY(-1px)}
.foot{text-align:center;margin-top:1.5rem;font-size:13px;color:var(--text3)}
.foot a{color:var(--cyan);text-decoration:none;font-weight:500}
.foot a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<a href="index.html" class="back">← Back to ValueAI</a>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-mark">V</div>
    <span class="logo-text">ValueAI</span>
  </div>
  <h1>Welcome back</h1>
  <p class="sub">Log in to your ValueAI account</p>
  <div class="oauth">
    <a href="chat.html" class="oauth-btn"><span class="oauth-icon">G</span>Continue with Google</a>
    <a href="chat.html" class="oauth-btn"><span class="oauth-icon">⊞</span>Continue with Microsoft</a>
    <a href="chat.html" class="oauth-btn"><span class="oauth-icon">◆</span>Continue with Apple</a>
  </div>
  <div class="divider"><div class="div-line"></div><span class="div-txt">or continue with email</span><div class="div-line"></div></div>
  <div class="field">
    <label>Email address</label>
    <input type="email" placeholder="you@example.com">
  </div>
  <div class="field">
    <div class="field-row">
      <label style="margin-bottom:0">Password</label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>
    <input type="password" placeholder="••••••••" style="margin-top:.45rem">
  </div>
  <button class="submit" onclick="window.location='chat.html'">Log in to ValueAI</button>
  <div class="foot">Don't have an account? <a href="signup.html">Sign up free</a></div>
</div>
</body>
</html>
